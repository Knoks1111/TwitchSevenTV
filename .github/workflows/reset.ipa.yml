name: 🧹 Strip dylibs & Rebuild IPA

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag de la release contenant l'IPA (ex: ipa-base)"
        required: true
        default: "ipa-base"
      ipa_filename:
        description: "Nom exact du fichier IPA dans la release"
        required: true
        default: "Twitch29.6.7TV.01.ipa"
      output_name:
        description: "Nom de l'IPA finale (sans .ipa)"
        required: true
        default: "Twitch_clean"

permissions:
  contents: read

jobs:
  strip-and-rebuild:
    runs-on: macos-14
    timeout-minutes: 15

    steps:
      # ─── 1. Télécharger l'IPA depuis la release ───────────────────────────
      - name: 📥 Télécharger l'IPA depuis la release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "📦 Téléchargement de ${{ github.event.inputs.ipa_filename }} (tag: ${{ github.event.inputs.release_tag }})"
          gh release download "${{ github.event.inputs.release_tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "${{ github.event.inputs.ipa_filename }}" \
            --output original.ipa
          echo "✅ Téléchargement terminé : $(du -sh original.ipa | cut -f1)"

      # ─── 2. Extraire l'IPA ────────────────────────────────────────────────
      - name: 📂 Extraire l'IPA
        run: |
          unzip -q original.ipa -d IPA_extracted
          echo "📁 Contenu de Payload :"
          ls -lah IPA_extracted/Payload/

      # ─── 3. Détecter le binaire principal ────────────────────────────────
      - name: 🔍 Détecter le binaire et les dylibs injectées
        id: detect
        run: |
          APP_DIR=$(ls -d IPA_extracted/Payload/*.app | head -1)
          APP_NAME=$(basename "$APP_DIR" .app)
          BINARY="$APP_DIR/$APP_NAME"
          FRAMEWORKS="$APP_DIR/Frameworks"

          echo "APP_DIR=$APP_DIR"         >> $GITHUB_ENV
          echo "APP_NAME=$APP_NAME"       >> $GITHUB_ENV
          echo "BINARY=$BINARY"           >> $GITHUB_ENV
          echo "FRAMEWORKS=$FRAMEWORKS"   >> $GITHUB_ENV

          echo "🔎 Binaire principal : $BINARY"
          echo ""
          echo "📋 Toutes les dylibs chargées (hors Apple/système) :"
          otool -L "$BINARY" | grep -v '/usr/lib' | grep -v '/System' | grep -v "$APP_NAME" || echo "(aucune)"

      # ─── 4. Installer optool (binaire pré-compilé) ───────────────────────
      - name: 🛠️ Installer optool
        run: |
          curl -sSL https://github.com/alexzielenski/optool/releases/download/0.1/optool.zip \
            -o /tmp/optool.zip
          unzip -q /tmp/optool.zip -d /tmp/optool_bin
          sudo cp /tmp/optool_bin/optool /usr/local/bin/optool
          sudo chmod +x /usr/local/bin/optool
          echo "✅ optool installé"

      # ─── 5. Supprimer les dylibs custom ──────────────────────────────────
      - name: 🗑️ Supprimer les dylibs custom
        run: |
          # ⚙️  Liste des dylibs à retirer — modifie selon ton IPA
          DYLIBS_TO_REMOVE=(
            "TwitchControl0.0.5.dylib"
            "MadeByMohkg.dylib"
            "zxPluginsInject.dylib"
            "sideloadFixerLol.dylib"
          )

          REMOVED=0
          SKIPPED=0

          for DYLIB in "${DYLIBS_TO_REMOVE[@]}"; do
            DYLIB_PATH="$FRAMEWORKS/$DYLIB"

            if [ -f "$DYLIB_PATH" ]; then
              # Retirer l'entrée LC_LOAD_DYLIB du binaire Mach-O
              optool uninstall -p "@rpath/$DYLIB" -t "$BINARY" 2>/dev/null \
                && echo "🔧 LC_LOAD_DYLIB retiré : $DYLIB" \
                || echo "⚠️  optool skip (déjà absent ou chemin différent) : $DYLIB"

              # Supprimer le fichier physique
              rm -f "$DYLIB_PATH"
              echo "🗑️  Fichier supprimé : $DYLIB"
              REMOVED=$((REMOVED + 1))
            else
              echo "⏭️  Non trouvée (déjà absente) : $DYLIB"
              SKIPPED=$((SKIPPED + 1))
            fi
          done

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ Supprimées : $REMOVED   ⏭️ Ignorées : $SKIPPED"
          echo ""
          echo "📋 Frameworks restants :"
          ls -lah "$FRAMEWORKS/"

      # ─── 6. Vérification post-nettoyage ───────────────────────────────────
      - name: ✅ Vérifier le binaire nettoyé
        run: |
          echo "📋 Load commands après nettoyage (hors Apple/système) :"
          REMAINING=$(otool -L "$BINARY" | grep -v '/usr/lib' | grep -v '/System' | grep -v "$APP_NAME" || true)
          if [ -z "$REMAINING" ]; then
            echo "✅ Aucune dylib tierce détectée — binaire propre !"
          else
            echo "⚠️  Dylibs encore présentes :"
            echo "$REMAINING"
          fi

      # ─── 7. Repackager en IPA ─────────────────────────────────────────────
      - name: 📦 Repackager en IPA propre
        run: |
          OUTPUT_IPA="${{ github.event.inputs.output_name }}.ipa"
          cd IPA_extracted
          zip -qr "../$OUTPUT_IPA" Payload/
          cd ..
          echo "OUTPUT_IPA=$OUTPUT_IPA" >> $GITHUB_ENV
          echo "✅ IPA reconstruite : $(du -sh "$OUTPUT_IPA" | cut -f1)"

      # ─── 8. Upload de l'artifact ──────────────────────────────────────────
      - name: 📤 Upload de l'IPA finale
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.output_name }}
          path: ${{ env.OUTPUT_IPA }}
          retention-days: 7
          compression-level: 0   # L'IPA est déjà un ZIP, inutile de recompresser
