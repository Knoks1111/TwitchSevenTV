name: 🧹 Supprimer tous les artifacts

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: 🗑️ Supprimer les anciens runs de tous les workflows
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_RUN_ID: ${{ github.run_id }}
        run: |
          REPO="${{ github.repository }}"
          TOTAL_DELETED=0

          echo "🔍 Récupération de tous les workflows..."

          # Récupérer tous les workflow IDs + noms
          WORKFLOWS=$(curl --silent \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/actions/workflows?per_page=100" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for w in data.get('workflows', []):
              print(w['id'], w['name'])
          ")

          if [ -z "$WORKFLOWS" ]; then
            echo "⚠️  Aucun workflow trouvé"
            exit 0
          fi

          echo "$WORKFLOWS" | while IFS=' ' read -r WF_ID WF_NAME_REST; do
            WF_NAME="$WF_ID $WF_NAME_REST"
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "📋 Workflow: $WF_NAME_REST (ID: $WF_ID)"

            PAGE=1
            DELETED=0
            FIRST=true

            while true; do
              RUNS=$(curl --silent \
                --header "Authorization: Bearer $GH_TOKEN" \
                --header "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${REPO}/actions/workflows/${WF_ID}/runs?per_page=100&page=${PAGE}" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for r in data.get('workflow_runs', []):
              print(r['id'])
          ")

              [ -z "$(echo "$RUNS" | tr -d '[:space:]')" ] && break
              COUNT=$(echo "$RUNS" | grep -c '[0-9]' || true)

              for RUN_ID in $RUNS; do
                # Toujours garder le run en cours (ce workflow)
                if [ "$RUN_ID" = "$CURRENT_RUN_ID" ]; then
                  echo "  ⭐ Conservé (run en cours): $RUN_ID"
                  FIRST=false
                  continue
                fi
                # Garder le plus récent de chaque workflow
                if [ "$FIRST" = "true" ]; then
                  echo "  ⭐ Conservé (plus récent): $RUN_ID"
                  FIRST=false
                  continue
                fi
                HTTP=$(curl --silent --output /dev/null --write-out "%{http_code}" \
                  --request DELETE \
                  --header "Authorization: Bearer $GH_TOKEN" \
                  --header "Accept: application/vnd.github+json" \
                  "https://api.github.com/repos/${REPO}/actions/runs/${RUN_ID}")
                if [ "$HTTP" = "204" ]; then
                  DELETED=$((DELETED+1))
                  echo "  ✅ Supprimé: $RUN_ID"
                else
                  echo "  ⚠️  Échec ($HTTP): $RUN_ID"
                fi
              done

              [ "$COUNT" -lt 100 ] && break
              PAGE=$((PAGE+1))
            done

            echo "  → $DELETED run(s) supprimé(s)"
          done

          echo ""
          echo "✅ Nettoyage terminé"
