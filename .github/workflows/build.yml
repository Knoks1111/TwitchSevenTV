name: Build TwitchSevenTV + Inject into IPA

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: 'URL directe IPA Twitch (optionnel si secret TWITCH_IPA_URL configuré)'
        required: false
        default: ''
  push:
    branches: [ main ]
    paths: ['**.xm', '**.m', '**.h', 'Makefile']

env:
  THEOS: ${{ github.workspace }}/theos

jobs:
  build:
    runs-on: macos-14

    steps:

      - name: 📥 Récupérer le code du tweak
        uses: actions/checkout@v4

      - name: 💾 Cache Theos
        id: cache-theos
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/theos
          key: theos-ios-${{ runner.os }}-v7

      - name: 🔧 Installer Theos + SDK iOS
        if: steps.cache-theos.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail

          echo "📦 Clonage de Theos..."
          git clone --recursive https://github.com/theos/theos.git "$THEOS"

          cat > /tmp/find_sdk.py << 'PYEOF'
          import sys, json
          try:
              data = json.load(sys.stdin)
              assets = data.get('assets', [])
              prefs = ['iPhoneOS16.5', 'iPhoneOS17', 'iPhoneOS16', 'iPhone']
              for pref in prefs:
                  for a in assets:
                      name = a.get('name', '')
                      if pref in name and name.endswith('.tar.xz'):
                          print(a['browser_download_url'])
                          sys.exit(0)
          except Exception:
              pass
          print('')
          PYEOF

          echo "🔍 Recherche SDK via API GitHub..."
          API_URL=$(curl --fail --silent \
            "https://api.github.com/repos/theos/sdks/releases/latest" \
            | python3 /tmp/find_sdk.py 2>/dev/null || true)

          SDK_URLS=(
            "https://github.com/theos/sdks/releases/download/1668536885/iPhoneOS16.5.sdk.tar.xz"
            "https://github.com/theos/sdks/releases/download/1682607494/iPhoneOS16.5.sdk.tar.xz"
            "https://github.com/theos/sdks/releases/download/1668536885/iPhoneOS15.5.sdk.tar.xz"
          )
          if [ -n "$API_URL" ]; then
            SDK_URLS=("$API_URL" "${SDK_URLS[@]}")
          fi

          SDK_FILE="/tmp/iphone_sdk.tar.xz"
          SDK_OK=false

          for URL in "${SDK_URLS[@]}"; do
            echo "⬇️  Tentative: $URL"
            if curl --fail --silent --location --output "$SDK_FILE" "$URL"; then
              FILE_TYPE=$(file --brief "$SDK_FILE" 2>/dev/null || echo "unknown")
              echo "   Type: $FILE_TYPE"
              if echo "$FILE_TYPE" | grep -qiE "XZ compressed|compressed data"; then
                echo "✅ SDK valide"
                SDK_OK=true
                break
              else
                echo "⚠️  Pas du XZ, suivant..."
                rm -f "$SDK_FILE"
              fi
            else
              echo "⚠️  Échec HTTP"
              rm -f "$SDK_FILE" 2>/dev/null || true
            fi
          done

          if [ "$SDK_OK" != "true" ]; then
            echo "❌ Impossible de télécharger un SDK iOS valide"
            exit 1
          fi

          echo "📂 Extraction SDK..."
          tar -xJf "$SDK_FILE" -C "$THEOS/sdks/"
          rm -f "$SDK_FILE"
          echo "📋 SDKs:"; ls "$THEOS/sdks/"
          echo "✅ Theos + SDK prêts"

      - name: 🔑 Installer ldid + lief
        run: |
          set -euo pipefail

          # ldid via brew (signe les binaires iOS sans certificat Apple)
          brew install ldid
          ldid 2>&1 | head -1 || true
          echo "✅ ldid: $(which ldid)"

          # lief via pip — injecte les dépendances dylib dans les Mach-O
          # Remplace insert_dylib (projet Xcode non compilable en CI)
          pip3 install lief --quiet
          python3 -c "import lief; print('✅ lief', lief.__version__)"

      - name: 🔨 Compiler le tweak
        run: |
          set -euo pipefail
          export PATH="$THEOS/bin:$PATH"

          SDK_NAME=$(ls "$THEOS/sdks/" | grep -E 'iPhoneOS[0-9.]+\.sdk' | sort -V | tail -1)
          if [ -z "$SDK_NAME" ]; then
            echo "❌ Aucun SDK dans $THEOS/sdks/"; exit 1
          fi

          SDK_VER=$(echo "$SDK_NAME" | grep -oE '[0-9]+\.[0-9]+')
          echo "📱 SDK: $SDK_NAME"

          MAKE_EXTRA=""
          if [ "$SDK_VER" != "16.5" ]; then
            MAKE_EXTRA="TARGET=iphone:clang:${SDK_VER}:14.0"
          fi

          make -j$(sysctl -n hw.ncpu) package FINALPACKAGE=1 $MAKE_EXTRA

          # Trouver le .dylib compilé
          DYLIB_PATH=$(find .theos -name "TwitchSevenTV.dylib" 2>/dev/null | head -1)
          if [ -z "$DYLIB_PATH" ]; then
            echo "❌ TwitchSevenTV.dylib introuvable après make"
            find . -name "*.dylib" 2>/dev/null || true
            exit 1
          fi

          # Signer le .dylib immédiatement après compilation
          echo "🔑 Signature ldid: $DYLIB_PATH"
          ldid -S "$DYLIB_PATH"
          echo "✅ ldid OK — $(file "$DYLIB_PATH")"

          # Trouver le .deb
          DEB_PATH=$(find packages -name "*.deb" 2>/dev/null | head -1)
          if [ -z "$DEB_PATH" ]; then
            echo "❌ Aucun .deb dans packages/"
            ls packages/ 2>/dev/null || echo "(vide)"
            exit 1
          fi

          echo "✅ .dylib: $DYLIB_PATH ($(du -sh "$DYLIB_PATH" | cut -f1))"
          echo "✅ .deb:   $DEB_PATH   ($(du -sh "$DEB_PATH"   | cut -f1))"
          echo "DYLIB_PATH=$DYLIB_PATH" >> $GITHUB_ENV
          echo "DEB_PATH=$DEB_PATH"     >> $GITHUB_ENV

      - name: 📲 Télécharger l'IPA Twitch
        run: |
          set -euo pipefail

          IPA_URL="${{ github.event.inputs.ipa_url }}"
          if [ -z "$IPA_URL" ]; then
            IPA_URL="${{ secrets.TWITCH_IPA_URL }}"
          fi
          if [ -z "$IPA_URL" ]; then
            echo "❌ Pas d'URL IPA — configure TWITCH_IPA_URL dans Settings → Secrets"
            exit 1
          fi

          curl --fail --location --output Twitch.ipa "$IPA_URL"

          if [ ! -s "Twitch.ipa" ]; then
            echo "❌ IPA vide ou absente"; exit 1
          fi

          FILE_TYPE=$(file --brief Twitch.ipa)
          echo "Type: $FILE_TYPE"
          if ! echo "$FILE_TYPE" | grep -qiE "zip|archive"; then
            echo "❌ Pas une IPA valide — lien expiré ? Re-upload sur Filebin et mets à jour TWITCH_IPA_URL"
            exit 1
          fi

          echo "✅ IPA: $(du -sh Twitch.ipa | cut -f1)"

      - name: 💉 Injecter 7TV dans l'IPA Twitch
        run: |
          set -euo pipefail
          DYLIB_PATH="${{ env.DYLIB_PATH }}"

          echo "📱 IPA source: $(du -sh Twitch.ipa | cut -f1)"
          echo "🔧 .dylib:     $DYLIB_PATH"

          # ── 1. Extraire l'IPA ──
          mkdir -p IPA_work
          unzip -q Twitch.ipa -d IPA_work

          # ── 2. Trouver le .app ──
          APP_PATH=$(find IPA_work/Payload -maxdepth 1 -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "❌ Aucun .app dans Payload/"
            ls IPA_work/Payload/ || true
            exit 1
          fi
          echo "📂 App: $APP_PATH"

          # ── 3. Trouver le binaire principal (3 méthodes en cascade) ──
          APP_NAME=$(basename "$APP_PATH" .app)
          BINARY="$APP_PATH/$APP_NAME"

          if [ ! -f "$BINARY" ]; then
            EXEC_NAME=$(/usr/libexec/PlistBuddy -c "Print CFBundleExecutable" \
              "$APP_PATH/Info.plist" 2>/dev/null || true)
            [ -n "$EXEC_NAME" ] && BINARY="$APP_PATH/$EXEC_NAME"
          fi

          if [ ! -f "$BINARY" ]; then
            BINARY=$(find "$APP_PATH" -maxdepth 1 -type f \
              -exec sh -c 'file "$1" | grep -q "Mach-O" && echo "$1"' _ {} \; | head -1)
          fi

          if [ -z "$BINARY" ] || [ ! -f "$BINARY" ]; then
            echo "❌ Binaire principal introuvable dans $APP_PATH"
            ls "$APP_PATH" | head -20
            exit 1
          fi
          echo "⚙️  Binaire: $BINARY"
          echo "   Type: $(file "$BINARY")"

          # ── 4. Copier le .dylib signé dans le bundle ──
          cp "$DYLIB_PATH" "$APP_PATH/TwitchSevenTV.dylib"
          echo "✅ .dylib copié"

          # ── 5. Injecter la dépendance via Python lief ──
          # lief est fiable, portable, pas de compilation requise
          python3 << PYEOF
          import lief, sys, os

          binary_path = "$BINARY"
          dylib_ref   = "@executable_path/TwitchSevenTV.dylib"

          fat = lief.MachO.parse(binary_path)
          if fat is None:
              print("❌ lief: impossible de parser le binaire")
              sys.exit(1)

          injected = False
          for macho in fat:
              # Vérifier si déjà injecté
              already = any(dylib_ref in str(cmd.name)
                            for cmd in macho.commands
                            if hasattr(cmd, 'name'))
              if already:
                  print(f"⚠️  Déjà injecté dans cette slice — skip")
                  continue

              macho.add_library(dylib_ref)
              injected = True
              print(f"✅ Injecté dans slice arch={macho.header.cpu_type}")

          if not injected:
              print("⚠️  Toutes les slices étaient déjà patchées")

          # Écrire le binaire modifié
          fat.write(binary_path)
          print(f"✅ Binaire écrit: {binary_path}")
          PYEOF

          # ── 6. Re-signer .dylib ET binaire avec ldid ──
          ldid -S "$APP_PATH/TwitchSevenTV.dylib"
          ldid -S "$BINARY"
          echo "✅ Re-signature ldid OK"

          # ── 7. Recréer l'IPA proprement ──
          cd IPA_work
          find . -name ".DS_Store" -delete 2>/dev/null || true
          find . -name "__MACOSX" -exec rm -rf {} + 2>/dev/null || true

          zip -qr ../TwitchSevenTV_patched.ipa Payload \
            --exclude "*.DS_Store" \
            --exclude "__MACOSX/*"
          cd ..

          if [ ! -s "TwitchSevenTV_patched.ipa" ]; then
            echo "❌ IPA patchée vide"
            exit 1
          fi
          echo "✅ IPA patchée: $(du -sh TwitchSevenTV_patched.ipa | cut -f1)"

      - name: 📤 Sauvegarder l'IPA patchée
        uses: actions/upload-artifact@v4
        with:
          name: TwitchSevenTV-Patched-IPA
          path: TwitchSevenTV_patched.ipa
          retention-days: 30

      - name: 📤 Sauvegarder le .deb (optionnel)
        uses: actions/upload-artifact@v4
        with:
          name: TwitchSevenTV-deb
          path: ${{ env.DEB_PATH }}
          retention-days: 30

      - name: ✅ Résumé
        run: |
          echo "========================================"
          echo "  TwitchSevenTV — Build terminé! 🎉"
          echo "========================================"
          echo "Onglet Actions → Artifacts → TwitchSevenTV-Patched-IPA"
          echo "Installe via SideStore"
          echo ""
          echo "⚠️  Si l'IPA Filebin est expirée:"
          echo "   1. Re-upload l'IPA sur filebin.net ou wetransfer.com"
          echo "   2. Settings → Secrets → TWITCH_IPA_URL → Update"
          echo "   3. Relancer le workflow"
          echo "========================================"
