name: Build TwitchSevenTV + Inject into IPA

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: 'URL directe de ton IPA Twitch modifié (Google Drive, WeTransfer...)'
        required: false
        default: ''
  push:
    branches: [ main ]
    paths:
      - '**.xm'
      - '**.m'
      - '**.h'
      - 'Makefile'

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: 📥 Récupérer le code du tweak
        uses: actions/checkout@v4

      - name: 💾 Cache Theos
        uses: actions/cache@v4
        with:
          path: /opt/theos
          key: theos-ios-${{ runner.os }}-v2

      - name: 🔧 Installer Theos + ldid
        run: |
          # Installer ldid (outil de signature iOS, requis par Theos)
          brew install ldid

          if [ ! -d "/opt/theos" ]; then
            echo "Installation de Theos..."
            sudo git clone --recursive \
              https://github.com/theos/theos.git /opt/theos

            curl -sSL https://github.com/theos/sdks/releases/latest/download/iPhoneOS16.5.sdk.tar.xz \
              | sudo tar -xJf - -C /opt/theos/sdks/
          else
            echo "Theos déjà en cache ✅"
          fi

          echo "THEOS=/opt/theos" >> $GITHUB_ENV
          echo "/opt/theos/bin" >> $GITHUB_PATH

      - name: 🔨 Compiler le tweak
        run: |
          export THEOS=/opt/theos
          make -j$(sysctl -n hw.ncpu) package FINALPACKAGE=1

          DYLIB_PATH=$(find .theos -name "*.dylib" | head -1)
          if [ -z "$DYLIB_PATH" ]; then
            echo "❌ Erreur: .dylib non trouvé après compilation"
            exit 1
          fi
          echo "✅ .dylib compilé: $DYLIB_PATH"
          echo "DYLIB_PATH=$DYLIB_PATH" >> $GITHUB_ENV

      - name: 📲 Télécharger l'IPA Twitch
        run: |
          IPA_URL="${{ github.event.inputs.ipa_url }}"
          if [ -z "$IPA_URL" ]; then
            IPA_URL="${{ secrets.TWITCH_IPA_URL }}"
          fi

          if [ -z "$IPA_URL" ]; then
            echo "❌ Pas d'URL IPA fournie!"
            exit 1
          fi

          echo "📥 Téléchargement de l'IPA..."
          curl -L -o Twitch.ipa "$IPA_URL"

          if [ ! -f "Twitch.ipa" ]; then
            echo "❌ Téléchargement échoué"
            exit 1
          fi

          IPA_SIZE=$(du -sh Twitch.ipa | cut -f1)
          echo "✅ IPA téléchargée: $IPA_SIZE"

      - name: 🛠️ Installer insert_dylib
        run: |
          git clone https://github.com/Tyilo/insert_dylib.git /tmp/insert_dylib
          cd /tmp/insert_dylib
          xcodebuild -project insert_dylib.xcodeproj \
                     -scheme insert_dylib \
                     -configuration Release \
                     SYMROOT=/tmp/insert_dylib_build 2>/dev/null
          sudo cp /tmp/insert_dylib_build/Release/insert_dylib /usr/local/bin/
          echo "✅ insert_dylib disponible"

      - name: 💉 Injecter 7TV dans l'IPA Twitch
        run: |
          echo "📦 Extraction de l'IPA..."
          mkdir -p IPA_work
          cd IPA_work
          unzip -q ../Twitch.ipa

          APP_DIR=$(find Payload -name "*.app" -maxdepth 1 -type d | head -1)
          if [ -z "$APP_DIR" ]; then
            echo "❌ Impossible de trouver le bundle .app dans l'IPA"
            exit 1
          fi

          APP_NAME=$(basename "$APP_DIR" .app)
          BINARY_PATH="$APP_DIR/$APP_NAME"
          echo "📱 App trouvée: $APP_DIR"

          mkdir -p "$APP_DIR/Frameworks"
          DYLIB_NAME="TwitchSevenTV.dylib"
          cp "$GITHUB_WORKSPACE/${{ env.DYLIB_PATH }}" "$APP_DIR/Frameworks/$DYLIB_NAME"
          echo "✅ .dylib copié dans Frameworks/"

          insert_dylib \
            --strip-codesig \
            --inplace \
            "@executable_path/Frameworks/$DYLIB_NAME" \
            "$BINARY_PATH"
          echo "✅ .dylib injecté dans le binaire"

          echo "📦 Repackaging en IPA..."
          zip -qr ../TwitchSevenTV_patched.ipa Payload/
          cd ..

          IPA_SIZE=$(du -sh TwitchSevenTV_patched.ipa | cut -f1)
          echo "✅ Nouvelle IPA créée: $IPA_SIZE"

      - name: 📤 Sauvegarder l'IPA patchée
        uses: actions/upload-artifact@v4
        with:
          name: TwitchSevenTV-Patched-IPA
          path: TwitchSevenTV_patched.ipa
          retention-days: 30

      - name: 📤 Sauvegarder le .dylib seul
        uses: actions/upload-artifact@v4
        with:
          name: TwitchSevenTV-dylib-only
          path: ${{ env.DYLIB_PATH }}
          retention-days: 30

      - name: ✅ Résumé
        run: |
          echo "========================================"
          echo "  TwitchSevenTV - Build terminé! 🎉"
          echo "========================================"
          echo "📥 Télécharge l'IPA dans l'onglet Artifacts"
          echo "📱 Installe via SideStore"
          echo "========================================"
