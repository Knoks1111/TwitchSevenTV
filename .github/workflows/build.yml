# ============================================================
# .github/workflows/build.yml
#
# Ce fichier automatise TOUT le processus de compilation et injection:
# 1. Configure un Mac virtuel gratuit sur GitHub
# 2. Installe Theos (outil de compilation de tweaks iOS)
# 3. Compile le tweak → produit un fichier .dylib
# 4. Injecte le .dylib dans ton IPA Twitch existant via Azule
# 5. Produit une nouvelle IPA prête à installer via SideStore
# ============================================================

name: Build TwitchSevenTV + Inject into IPA

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: 'URL directe de ton IPA Twitch modifiée (optionnel si secret configuré)'
        required: false
        default: ''

  push:
    branches: [ main ]
    paths:
      - '**.xm'
      - '**.m'
      - '**.h'
      - 'Makefile'

jobs:
  build:
    runs-on: macos-14

    steps:
      # ── Étape 1: Récupérer le code ──
      - name: 📥 Récupérer le code du tweak
        uses: actions/checkout@v4

      # ── Étape 2: Cache Theos ──
      - name: 💾 Cache Theos
        uses: actions/cache@v4
        with:
          path: /opt/theos
          key: theos-ios-${{ runner.os }}-v2

      # ── Étape 3: Installer Theos + SDK + ldid ──
      - name: 🔧 Installer Theos + ldid
        run: |
          if [ ! -d "/opt/theos" ]; then
            echo "Installation de Theos..."
            sudo git clone --recursive \
              https://github.com/theos/theos.git /opt/theos

            # Télécharger le SDK iOS 16.5 (tag fixe pour éviter les 404)
            echo "Téléchargement du SDK iOS 16.5..."
            curl -sSL \
              "https://github.com/theos/sdks/releases/download/1668536885/iPhoneOS16.5.sdk.tar.xz" \
              | sudo tar -xJf - -C /opt/theos/sdks/ \
              || {
                echo "⚠️ Premier miroir échoué, tentative miroir alternatif..."
                curl -sSL \
                  "https://github.com/xybp888/iOS-SDKs/releases/download/v16.5/iPhoneOS16.5.sdk.tar.xz" \
                  | sudo tar -xJf - -C /opt/theos/sdks/
              }
          else
            echo "Theos déjà en cache ✅"
          fi

          # ldid : outil de signature (obligatoire pour sideloading)
          brew install ldid

          # Configurer les variables d'environnement
          echo "THEOS=/opt/theos" >> $GITHUB_ENV
          echo "/opt/theos/bin" >> $GITHUB_PATH

      # ── Étape 4: Compiler le tweak → produit un .dylib ──
      - name: 🔨 Compiler le tweak
        run: |
          export THEOS=/opt/theos

          # Vérifier que le SDK est bien là
          ls /opt/theos/sdks/ || { echo "❌ Aucun SDK trouvé dans /opt/theos/sdks/"; exit 1; }

          # Compiler
          make -j$(sysctl -n hw.ncpu) package FINALPACKAGE=1

          # Chercher le .dylib du tweak (nom exact en priorité)
          DYLIB_PATH=$(find .theos/obj -name "TwitchSevenTV.dylib" 2>/dev/null | head -1)
          if [ -z "$DYLIB_PATH" ]; then
            DYLIB_PATH=$(find .theos -name "TwitchSevenTV.dylib" 2>/dev/null | head -1)
          fi
          if [ -z "$DYLIB_PATH" ]; then
            echo "❌ TwitchSevenTV.dylib introuvable. Contenu de .theos/obj :"
            find .theos/obj -type f 2>/dev/null || echo "(vide)"
            exit 1
          fi

          echo "✅ .dylib compilé: $DYLIB_PATH"
          echo "DYLIB_PATH=$DYLIB_PATH" >> $GITHUB_ENV

      # ── Étape 5: Télécharger l'IPA Twitch ──
      - name: 📲 Télécharger l'IPA Twitch
        run: |
          IPA_URL="${{ github.event.inputs.ipa_url }}"
          if [ -z "$IPA_URL" ]; then
            IPA_URL="${{ secrets.TWITCH_IPA_URL }}"
          fi

          if [ -z "$IPA_URL" ]; then
            echo "❌ Pas d'URL IPA fournie!"
            echo "Configure le secret TWITCH_IPA_URL dans Settings → Secrets"
            exit 1
          fi

          echo "📥 Téléchargement de l'IPA..."
          curl -L -o Twitch.ipa "$IPA_URL"

          if [ ! -f "Twitch.ipa" ] || [ ! -s "Twitch.ipa" ]; then
            echo "❌ Téléchargement échoué ou fichier vide"
            exit 1
          fi

          IPA_SIZE=$(du -sh Twitch.ipa | cut -f1)
          echo "✅ IPA téléchargée: $IPA_SIZE"

      # ── Étape 6: Installer Azule ──
      # Azule est l'outil standard utilisé par uYouPlus, Watusi, etc.
      # Il gère: injection dylib + bundling CydiaSubstrate + fix rpath + repackage IPA.
      - name: 🛠️ Installer Azule
        run: |
          git clone --depth=1 https://github.com/Al4ise/Azule /tmp/azule
          sudo ln -sf /tmp/azule/azule /usr/local/bin/azule
          sudo chmod +x /tmp/azule/azule
          echo "✅ Azule installé"

      # ── Étape 7: Injecter le .dylib dans l'IPA ──
      - name: 💉 Injecter 7TV dans l'IPA Twitch
        run: |
          DYLIB_PATH="${{ env.DYLIB_PATH }}"
          echo "📱 IPA source : $(du -sh Twitch.ipa | cut -f1)"
          echo "🔧 dylib      : $DYLIB_PATH ($(du -sh "$DYLIB_PATH" | cut -f1))"

          # Azule injecte le dylib ET bundle automatiquement CydiaSubstrate
          azule \
            -i Twitch.ipa \
            -o . \
            -f "$DYLIB_PATH"

          # Azule nomme le fichier de sortie automatiquement → on le renomme
          PATCHED=$(find . -maxdepth 1 -name "*.ipa" ! -name "Twitch.ipa" | head -1)
          if [ -z "$PATCHED" ]; then
            echo "❌ Azule n'a produit aucune IPA patched"
            echo "Fichiers .ipa présents :"
            ls -la *.ipa 2>/dev/null || echo "(aucun)"
            exit 1
          fi

          mv "$PATCHED" TwitchSevenTV_patched.ipa
          echo "✅ IPA patchée : $(du -sh TwitchSevenTV_patched.ipa | cut -f1)"

      # ── Étape 8: Sauvegarder les artifacts ──
      - name: 📤 Sauvegarder l'IPA patchée
        uses: actions/upload-artifact@v4
        with:
          name: TwitchSevenTV-Patched-IPA
          path: TwitchSevenTV_patched.ipa
          retention-days: 30

      - name: 📤 Sauvegarder le .dylib seul (optionnel)
        uses: actions/upload-artifact@v4
        with:
          name: TwitchSevenTV-dylib-only
          path: ${{ env.DYLIB_PATH }}
          retention-days: 30

      # ── Étape 9: Résumé ──
      - name: ✅ Résumé
        run: |
          echo "========================================"
          echo "  TwitchSevenTV - Build terminé! 🎉"
          echo "========================================"
          echo ""
          echo "📥 Télécharge l'IPA depuis:"
          echo "   Onglet 'Actions' → ce workflow → section 'Artifacts'"
          echo "   → 'TwitchSevenTV-Patched-IPA'"
          echo ""
          echo "📱 Installation:"
          echo "   Installe via SideStore (remplace l'ancienne IPA Twitch)"
          echo "========================================"
