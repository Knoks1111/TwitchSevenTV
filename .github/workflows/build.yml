name: Build TwitchSevenTV + Inject into IPA

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: 'URL directe IPA Twitch (optionnel si secret TWITCH_IPA_URL configuré)'
        required: false
        default: ''
  push:
    branches: [ main ]
    paths: ['**.m', '**.h', 'Makefile']

env:
  THEOS: ${{ github.workspace }}/theos

jobs:
  build:
    runs-on: macos-14

    steps:

      - name: 📥 Récupérer le code du tweak
        uses: actions/checkout@v4

      - name: 💾 Cache Theos
        id: cache-theos
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/theos
          key: theos-ios-${{ runner.os }}-v8

      - name: 🔧 Installer Theos + SDK iOS
        if: steps.cache-theos.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          echo "📦 Clonage de Theos..."
          git clone --recursive https://github.com/theos/theos.git "$THEOS"

          # ── Trouver le SDK via API GitHub (avec token → jamais rate-limité) ──
          echo "🔍 Recherche SDK via API GitHub (authentifié)..."

          cat > /tmp/find_sdk.py << 'PYEOF'
          import sys, json
          try:
              data = json.load(sys.stdin)
              assets = data.get('assets', [])
              # Priorité: SDK le plus récent d'abord
              prefs = ['iPhoneOS17.5', 'iPhoneOS17.2', 'iPhoneOS17.0',
                       'iPhoneOS16.5', 'iPhoneOS16.4', 'iPhoneOS16',
                       'iPhoneOS15.5', 'iPhoneOS']
              for pref in prefs:
                  for a in assets:
                      name = a.get('name', '')
                      if pref in name and name.endswith('.tar.xz'):
                          print(a['browser_download_url'])
                          sys.exit(0)
              # Rien trouvé — afficher les assets disponibles pour debug
              print('', file=sys.stderr)
              print('Assets disponibles:', file=sys.stderr)
              for a in assets:
                  print(' -', a.get('name', '?'), file=sys.stderr)
          except Exception as e:
              print(f'Erreur: {e}', file=sys.stderr)
          print('')
          PYEOF

          API_RESPONSE=$(curl --silent --location \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/theos/sdks/releases/latest")

          echo "📋 Release name: $(echo "$API_RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('name','?'))" 2>/dev/null || echo '?')"

          API_URL=$(echo "$API_RESPONSE" | python3 /tmp/find_sdk.py 2>&1 | head -1)
          echo "🔗 URL API: ${API_URL:-(vide)}"

          # ── Liste de fallback: URLs /latest/download/ (toujours redirigées par GitHub) ──
          # Ces URLs pointent TOUJOURS vers le dernier release, sans ID hardcodé
          FALLBACK_URLS=(
            "https://github.com/theos/sdks/releases/latest/download/iPhoneOS17.5.sdk.tar.xz"
            "https://github.com/theos/sdks/releases/latest/download/iPhoneOS17.2.sdk.tar.xz"
            "https://github.com/theos/sdks/releases/latest/download/iPhoneOS17.0.sdk.tar.xz"
            "https://github.com/theos/sdks/releases/latest/download/iPhoneOS16.5.sdk.tar.xz"
            "https://github.com/theos/sdks/releases/latest/download/iPhoneOS16.4.sdk.tar.xz"
          )

          # Construire la liste finale: URL API en premier si trouvée
          ALL_URLS=()
          if [ -n "$API_URL" ] && [[ "$API_URL" == https://* ]]; then
            ALL_URLS+=("$API_URL")
          fi
          ALL_URLS+=("${FALLBACK_URLS[@]}")

          SDK_FILE="/tmp/iphone_sdk.tar.xz"
          SDK_OK=false

          for URL in "${ALL_URLS[@]}"; do
            echo "⬇️  Tentative: $URL"
            HTTP_CODE=$(curl --silent --location --output "$SDK_FILE" \
              --write-out "%{http_code}" "$URL" 2>/dev/null || echo "000")
            echo "   HTTP: $HTTP_CODE"

            if [ "$HTTP_CODE" = "200" ] && [ -s "$SDK_FILE" ]; then
              FILE_TYPE=$(file --brief "$SDK_FILE" 2>/dev/null || echo "unknown")
              echo "   Type: $FILE_TYPE"
              if echo "$FILE_TYPE" | grep -qiE "XZ compressed|compressed data"; then
                echo "✅ SDK valide"
                SDK_OK=true
                break
              else
                echo "⚠️  Fichier non-XZ (probablement une page 404 HTML)"
                rm -f "$SDK_FILE"
              fi
            else
              echo "⚠️  Échec (HTTP $HTTP_CODE ou fichier vide)"
              rm -f "$SDK_FILE" 2>/dev/null || true
            fi
          done

          if [ "$SDK_OK" != "true" ]; then
            echo "❌ Impossible de télécharger un SDK iOS valide"
            echo "   Vérifie https://github.com/theos/sdks/releases pour les noms de fichiers disponibles"
            exit 1
          fi

          echo "📂 Extraction SDK..."
          tar -xJf "$SDK_FILE" -C "$THEOS/sdks/"
          rm -f "$SDK_FILE"
          echo "📋 SDKs disponibles:"; ls "$THEOS/sdks/"
          echo "✅ Theos + SDK prêts"

      - name: 🔑 Installer ldid + lief
        run: |
          set -euo pipefail

          brew install ldid
          echo "✅ ldid: $(which ldid)"

          # lief épinglé à une version stable connue (évite les breaking changes d'API)
          pip3 install "lief==0.17.6" --quiet --break-system-packages
          python3 -c "import lief; print('✅ lief', lief.__version__)"

      - name: 🔨 Compiler le tweak
        run: |
          set -euo pipefail
          export PATH="$THEOS/bin:$PATH"

          SDK_NAME=$(ls "$THEOS/sdks/" | grep -E 'iPhoneOS[0-9.]+\.sdk' | sort -V | tail -1)
          if [ -z "$SDK_NAME" ]; then
            echo "❌ Aucun SDK dans $THEOS/sdks/"; exit 1
          fi

          SDK_VER=$(echo "$SDK_NAME" | grep -oE '[0-9]+\.[0-9]+')
          echo "📱 SDK: $SDK_NAME (version $SDK_VER)"

          MAKE_EXTRA=""
          if [ "$SDK_VER" != "16.5" ]; then
            MAKE_EXTRA="TARGET=iphone:clang:${SDK_VER}:14.0"
          fi

          make -j$(sysctl -n hw.ncpu) package FINALPACKAGE=1 $MAKE_EXTRA

          # Trouver le .dylib compilé (library.mk le place dans .theos/obj/)
          DYLIB_PATH=$(find .theos -name "TwitchSevenTV.dylib" 2>/dev/null | head -1)
          if [ -z "$DYLIB_PATH" ]; then
            # Fallback: chercher dans tout le dossier
            DYLIB_PATH=$(find . -name "TwitchSevenTV.dylib" 2>/dev/null | head -1)
          fi
          if [ -z "$DYLIB_PATH" ]; then
            echo "❌ TwitchSevenTV.dylib introuvable après make"
            find . -name "*.dylib" 2>/dev/null || true
            exit 1
          fi

          # Signer le .dylib immédiatement
          echo "🔑 Signature ldid: $DYLIB_PATH"
          ldid -S "$DYLIB_PATH"
          echo "✅ ldid OK"
          echo "   Archi: $(lipo -archs "$DYLIB_PATH" 2>/dev/null || file "$DYLIB_PATH")"

          # Trouver le .deb (optionnel avec library.mk)
          DEB_PATH=$(find packages -name "*.deb" 2>/dev/null | head -1)
          if [ -z "$DEB_PATH" ]; then
            echo "⚠️  Aucun .deb dans packages/ (normal avec library.mk)"
            DEB_PATH=""
          fi

          echo "✅ .dylib: $DYLIB_PATH ($(du -sh "$DYLIB_PATH" | cut -f1))"
          [ -n "$DEB_PATH" ] && echo "✅ .deb:   $DEB_PATH   ($(du -sh "$DEB_PATH" | cut -f1))"
          echo "DYLIB_PATH=$DYLIB_PATH" >> $GITHUB_ENV
          echo "DEB_PATH=$DEB_PATH"     >> $GITHUB_ENV

      - name: 📲 Télécharger l'IPA Twitch
        run: |
          set -euo pipefail

          IPA_URL="${{ github.event.inputs.ipa_url }}"
          if [ -z "$IPA_URL" ]; then
            IPA_URL="${{ secrets.TWITCH_IPA_URL }}"
          fi
          if [ -z "$IPA_URL" ]; then
            echo "❌ Pas d'URL IPA — configure TWITCH_IPA_URL dans Settings → Secrets"
            exit 1
          fi

          HTTP_CODE=$(curl --silent --location --output Twitch.ipa \
            --write-out "%{http_code}" "$IPA_URL" 2>/dev/null || echo "000")
          echo "HTTP: $HTTP_CODE — Taille: $(du -sh Twitch.ipa 2>/dev/null | cut -f1)"

          if [ "$HTTP_CODE" != "200" ] || [ ! -s "Twitch.ipa" ]; then
            echo "❌ Téléchargement IPA échoué (HTTP $HTTP_CODE)"
            echo "   Le lien est peut-être expiré. Re-upload l'IPA et mets à jour TWITCH_IPA_URL"
            exit 1
          fi

          FILE_TYPE=$(file --brief Twitch.ipa)
          echo "Type: $FILE_TYPE"
          if ! echo "$FILE_TYPE" | grep -qiE "zip|archive"; then
            echo "❌ Pas une IPA valide (pas un ZIP)"
            echo "   Le lien a retourné du HTML — lien Filebin expiré ?"
            exit 1
          fi

          echo "✅ IPA: $(du -sh Twitch.ipa | cut -f1)"

      - name: 💉 Injecter 7TV dans l'IPA Twitch
        run: |
          set -euo pipefail
          DYLIB_PATH="${{ env.DYLIB_PATH }}"

          echo "📱 IPA source: $(du -sh Twitch.ipa | cut -f1)"
          echo "🔧 .dylib:     $DYLIB_PATH"

          # ── 1. Extraire l'IPA ──
          mkdir -p IPA_work
          unzip -q Twitch.ipa -d IPA_work

          # ── 2. Trouver le .app ──
          APP_PATH=$(find IPA_work/Payload -maxdepth 1 -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "❌ Aucun .app dans Payload/"
            ls IPA_work/Payload/ || true
            exit 1
          fi
          echo "📂 App: $APP_PATH"

          # ── 3. Trouver le binaire principal (3 méthodes en cascade) ──
          APP_NAME=$(basename "$APP_PATH" .app)
          BINARY="$APP_PATH/$APP_NAME"

          if [ ! -f "$BINARY" ]; then
            EXEC_NAME=$(/usr/libexec/PlistBuddy -c "Print CFBundleExecutable" \
              "$APP_PATH/Info.plist" 2>/dev/null || true)
            [ -n "$EXEC_NAME" ] && BINARY="$APP_PATH/$EXEC_NAME"
          fi

          if [ ! -f "$BINARY" ]; then
            BINARY=$(find "$APP_PATH" -maxdepth 1 -type f \
              -exec sh -c 'file "$1" | grep -q "Mach-O" && echo "$1"' _ {} \; | head -1)
          fi

          if [ -z "$BINARY" ] || [ ! -f "$BINARY" ]; then
            echo "❌ Binaire principal introuvable dans $APP_PATH"
            ls "$APP_PATH" | head -20
            exit 1
          fi
          echo "⚙️  Binaire: $BINARY"
          echo "   $(file "$BINARY")"

          # ── 4. Copier le .dylib signé dans le bundle ──
          cp "$DYLIB_PATH" "$APP_PATH/TwitchSevenTV.dylib"
          echo "✅ .dylib copié (substrate-free, aucun Frameworks/ nécessaire)"

          # ── 5. Injecter la dépendance via Python lief ──
          python3 << PYEOF
          import lief, sys

          binary_path = "$BINARY"
          dylib_ref   = "@executable_path/TwitchSevenTV.dylib"

          fat = lief.MachO.parse(binary_path)
          if fat is None:
              print("❌ lief: impossible de parser le binaire Mach-O")
              sys.exit(1)

          modified = False
          for macho in fat:
              libs = [str(cmd.name) for cmd in macho.commands if hasattr(cmd, 'name')]
              if any(dylib_ref in lib for lib in libs):
                  print(f"⚠️  Déjà injecté dans cette slice — skip")
                  continue
              macho.add_library(dylib_ref)
              modified = True
              arch = str(macho.header.cpu_type).split('.')[-1]
              print(f"✅ Injecté dans slice {arch}")

          # fat.write() gère le build automatiquement en lief 0.13+
          fat.write(binary_path)
          print(f"✅ Binaire écrit: {binary_path}")
          PYEOF

          # ── 6. Vérifier que l'injection est bien présente ──
          echo "🔍 Vérification otool -L:"
          otool -L "$BINARY" | grep -E "TwitchSevenTV|7tv" || {
            echo "❌ TwitchSevenTV.dylib absent des dépendances — injection échouée"
            otool -L "$BINARY" | head -10
            exit 1
          }
          echo "✅ Injection confirmée"

          # ── 7. Re-signer avec ldid ──
          ldid -S "$APP_PATH/TwitchSevenTV.dylib"
          echo "✅ ldid .dylib OK"

          # Le binaire principal : non-bloquant
          ldid -S "$BINARY" 2>/dev/null && echo "✅ ldid binaire OK" \
            || echo "⚠️  ldid binaire non-critique — SideStore re-signe au sideload"

          # ── 8. Recréer l'IPA proprement ──
          cd IPA_work
          find . -name ".DS_Store" -delete 2>/dev/null || true
          find . -name "__MACOSX" -exec rm -rf {} + 2>/dev/null || true

          zip -qr ../TwitchSevenTV_patched.ipa Payload \
            --exclude "*.DS_Store" \
            --exclude "__MACOSX/*"
          cd ..

          if [ ! -s "TwitchSevenTV_patched.ipa" ]; then
            echo "❌ IPA patchée vide"
            exit 1
          fi

          # Renommer avec numéro de build + date pour toujours avoir un nom unique
          BUILD_DATE=$(date +"%Y%m%d-%H%M")
          IPA_NAME="TwitchSevenTV_v${{ github.run_number }}_${BUILD_DATE}.ipa"
          mv TwitchSevenTV_patched.ipa "$IPA_NAME"
          echo "✅ IPA finale: $IPA_NAME ($(du -sh "$IPA_NAME" | cut -f1))"
          echo "IPA_NAME=$IPA_NAME" >> $GITHUB_ENV

      - name: 📤 Sauvegarder l'IPA patchée
        uses: actions/upload-artifact@v4
        with:
          name: TwitchSevenTV-v${{ github.run_number }}-Patched-IPA
          path: ${{ env.IPA_NAME }}
          retention-days: 30

      - name: 📤 Sauvegarder le .deb
        if: env.DEB_PATH != ''
        uses: actions/upload-artifact@v4
        with:
          name: TwitchSevenTV-deb
          path: ${{ env.DEB_PATH }}
          retention-days: 30

      - name: 📤 Sauvegarder la .dylib seule
        uses: actions/upload-artifact@v4
        with:
          name: TwitchSevenTV-dylib
          path: ${{ env.DYLIB_PATH }}
          retention-days: 30

      - name: ✅ Résumé
        run: |
          echo "========================================"
          echo "  TwitchSevenTV — Build terminé! 🎉"
          echo "========================================"
          echo "Onglet Actions → Artifacts → TwitchSevenTV-Patched-IPA"
          echo "Installe via SideStore"
          echo ""
          echo "💡 Pour tester rapidement sans resideload :"
          echo "   Télécharge TwitchSevenTV-dylib → glisse dans"
          echo "   LiveContainer → Tweaks de Twitch → relance"
          echo ""
          echo "⚠️  Si l'IPA est expirée (lien Filebin/WeTransfer mort):"
          echo "   1. Re-upload l'IPA"
          echo "   2. Settings → Secrets → TWITCH_IPA_URL → Update"
          echo "   3. Relancer le workflow"
          echo "========================================"
