name: 🔍 Analyser TwitchControl (strings)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    runs-on: macos-14

    steps:
      - name: 📥 Télécharger l'IPA
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download ipa-base \
            --repo "${{ github.repository }}" \
            --pattern "Twitch29.6.7TV.01.ipa" \
            --output Twitch_modded.ipa
          unzip -q Twitch_modded.ipa -d IPA_extracted

      - name: 🔎 Strings TwitchControl
        run: |
          DYLIB="IPA_extracted/Payload/Twitch.app/Frameworks/TwitchControl0.0.5.dylib"
          echo "==== URLs / domaines ===="
          strings "$DYLIB" | grep -iE "(http|cdn|domain|url|host|7tv|emote|animated|webp|gif|block|filter|deny)" | sort -u
          echo ""
          echo "==== Toutes les strings ===="
          strings "$DYLIB"

      - name: 🔎 Strings MadeByMohkg
        run: |
          DYLIB="IPA_extracted/Payload/Twitch.app/Frameworks/MadeByMohkg.dylib"
          echo "==== URLs / domaines ===="
          strings "$DYLIB" | grep -iE "(http|cdn|domain|url|host|7tv|emote|animated|webp|gif|block|filter|deny)" | sort -u
          echo ""
          echo "==== Toutes les strings ===="
          strings "$DYLIB"
