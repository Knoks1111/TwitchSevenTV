name: 🔍 Extraire les dylibs
on:
  workflow_dispatch:
    inputs:
      ipa_filename:
        description: 'Nom du fichier IPA (ex: Twitch.1.ipa)'
        required: true
        default: 'Twitch.1.ipa'
permissions:
  contents: read
jobs:
  extract:
    runs-on: macos-14
    steps:
      - name: 📥 Télécharger et extraire l'IPA
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download ipa-storage \
            --repo "${{ github.repository }}" \
            --pattern "${{ github.event.inputs.ipa_filename }}" \
            --output Twitch_modded.ipa
          unzip -q Twitch_modded.ipa -d IPA_extracted
          echo "=== Frameworks disponibles ==="
          ls IPA_extracted/Payload/Twitch.app/Frameworks/
      - name: 📤 Upload des dylibs
        uses: actions/upload-artifact@v4
        with:
          name: dylibs-extraites
          path: dylibs_output/
          retention-days: 1
