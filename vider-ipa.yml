name: 🌪️ Extraire dylibs & reset & Rebuild IPA

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag de la release contenant l'IPA (ex: ipa-base)"
        required: true
        default: "ipa-base"
      output_name:
        description: "Nom de l'IPA finale (sans .ipa)"
        required: true
        default: "Twitch_clean"

permissions:
  contents: read

jobs:
  strip-and-rebuild:
    runs-on: macos-14
    timeout-minutes: 15

    steps:
      # ─── 1. Télécharger l'IPA depuis la release ───────────────────────────
      - name: 📥 Télécharger l'IPA depuis la release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "📦 Téléchargement depuis release '${{ github.event.inputs.release_tag }}' (*.ipa)"
          gh release download "${{ github.event.inputs.release_tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "*.ipa" \
            --output original.ipa
          echo "✅ Téléchargement terminé : $(du -sh original.ipa | cut -f1)"

      # ─── 2. Extraire l'IPA ────────────────────────────────────────────────
      - name: 📂 Extraire l'IPA
        run: |
          unzip -q original.ipa -d IPA_extracted
          echo "📁 Contenu de Payload :"
          ls -lah IPA_extracted/Payload/

      # ─── 3. Détecter le binaire principal ────────────────────────────────
      - name: 🔍 Détecter le binaire et les dylibs injectées
        run: |
          APP_DIR=$(ls -d IPA_extracted/Payload/*.app | head -1)
          APP_NAME=$(basename "$APP_DIR" .app)
          BINARY="$APP_DIR/$APP_NAME"
          FRAMEWORKS="$APP_DIR/Frameworks"

          echo "APP_DIR=$APP_DIR"         >> $GITHUB_ENV
          echo "APP_NAME=$APP_NAME"       >> $GITHUB_ENV
          echo "BINARY=$BINARY"           >> $GITHUB_ENV
          echo "FRAMEWORKS=$FRAMEWORKS"   >> $GITHUB_ENV

          echo "🔎 Binaire principal : $BINARY"
          echo ""
          echo "📋 Toutes les dylibs chargées (hors Apple/système) :"
          otool -L "$BINARY" | grep -v '/usr/lib' | grep -v '/System' | grep -v "$APP_NAME" || echo "(aucune)"

      # ─── 4. Sauvegarder les dylibs custom AVANT nettoyage ────────────────
      - name: 💾 Sauvegarder les dylibs custom
        run: |
          mkdir -p dylibs_output

          echo "=== Toutes les dylibs dans Frameworks ==="
          find IPA_extracted/ -name "*.dylib" | sort

          # Copier uniquement les dylibs hors Apple/système
          while IFS= read -r dylib; do
            echo "📦 Sauvegarde : $(basename "$dylib")"
            cp "$dylib" dylibs_output/
          done < <(find IPA_extracted/ -name "*.dylib")

          echo ""
          echo "📋 Dylibs sauvegardées ($(ls dylibs_output/ | wc -l | tr -d ' ') fichiers) :"
          ls -lah dylibs_output/

      # ─── 5. Upload des dylibs extraites ──────────────────────────────────
      - name: 📤 Upload des dylibs extraites
        uses: actions/upload-artifact@v4
        with:
          name: dylibs-extraites
          path: dylibs_output/
          retention-days: 7
          compression-level: 0

      # ─── 6. Installer optool ──────────────────────────────────────────────
      - name: 🛠️ Installer optool
        run: |
          curl -sSL https://github.com/alexzielenski/optool/releases/download/0.1/optool.zip \
            -o /tmp/optool.zip
          unzip -q /tmp/optool.zip -d /tmp/optool_bin
          sudo cp /tmp/optool_bin/optool /usr/local/bin/optool
          sudo chmod +x /usr/local/bin/optool
          echo "✅ optool installé"

      # ─── 7. Supprimer automatiquement toutes les dylibs nues custom ───────
      # Règle : un fichier .dylib nu dans Frameworks/ = injection custom
      # Les frameworks légitimes de Twitch sont des dossiers .framework, pas des .dylib nus
      - name: 🗑️ Supprimer les dylibs custom (automatique)
        run: |
          REMOVED=0

          # Chercher tous les fichiers .dylib directement dans Frameworks/ (pas dans les sous-dossiers .framework)
          while IFS= read -r DYLIB_PATH; do
            DYLIB=$(basename "$DYLIB_PATH")

            echo "🔧 Retrait LC_LOAD_DYLIB : $DYLIB"
            optool uninstall -p "@rpath/$DYLIB" -t "$BINARY" 2>/dev/null \
              && echo "   ✅ LC_LOAD_DYLIB retiré" \
              || echo "   ⚠️  optool skip (chemin différent ou déjà absent)"

            rm -f "$DYLIB_PATH"
            echo "   🗑️  Fichier supprimé"
            REMOVED=$((REMOVED + 1))
          done < <(find "$FRAMEWORKS" -maxdepth 1 -name "*.dylib" -type f)

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ Dylibs supprimées : $REMOVED"
          echo ""
          echo "📋 Frameworks restants :"
          ls -lah "$FRAMEWORKS/"

      # ─── 8. Vérification post-nettoyage ───────────────────────────────────
      - name: ✅ Vérifier le binaire nettoyé
        run: |
          echo "📋 Load commands après nettoyage (hors Apple/système) :"
          REMAINING=$(otool -L "$BINARY" | grep -v '/usr/lib' | grep -v '/System' | grep -v "$APP_NAME" || true)
          if [ -z "$REMAINING" ]; then
            echo "✅ Aucune dylib tierce détectée — binaire propre !"
          else
            echo "⚠️  Dylibs encore présentes :"
            echo "$REMAINING"
          fi

      # ─── 9. Repackager en IPA ─────────────────────────────────────────────
      - name: 📦 Repackager en IPA propre
        run: |
          OUTPUT_IPA="${{ github.event.inputs.output_name }}.ipa"
          cd IPA_extracted
          zip -qr "../$OUTPUT_IPA" Payload/
          cd ..
          echo "OUTPUT_IPA=$OUTPUT_IPA" >> $GITHUB_ENV
          echo "✅ IPA reconstruite : $(du -sh "$OUTPUT_IPA" | cut -f1)"

      # ─── 10. Upload de l'IPA finale ───────────────────────────────────────
      - name: 📤 Upload de l'IPA finale
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.output_name }}
          path: ${{ env.OUTPUT_IPA }}
          retention-days: 7
          compression-level: 0
